<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历</title>
<style>
  :root {
    --accent: #1f6feb;
    --accent-dark: #0d3b8c;
    --ink: #1f2328;
    --muted: #57606a;
    --line: #e4e8ee;
    --bg-soft: #f6f8fb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    font-size: 13px;
    line-height: 1.7;
    background: #dfe3e8;
    padding-top: 52px;
  }
  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 12px auto;
    padding: 16mm 15mm;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,.12);
  }
  /* 头部 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    padding-bottom: 16px;
    border-bottom: 3px solid var(--accent);
  }
  .header .name { font-size: 30px; font-weight: 700; letter-spacing: 2px; color: var(--accent-dark); }
  .header .role { margin-top: 4px; font-size: 14px; color: var(--accent); font-weight: 600; }
  .header .contact { margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.9; }
  .header .contact span { display: inline-block; margin-right: 18px; white-space: nowrap; }
  .header .contact b { color: var(--ink); font-weight: 600; }
  .photo {
    position: relative; width: 90px; height: 120px; flex: 0 0 auto;
    border: 1px solid var(--line); border-radius: 4px;
    background: var(--bg-soft) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    color: #aab2bd; font-size: 12px; text-align: center; cursor: pointer; overflow: hidden;
  }
  .photo.has-img .photo-hint { display: none; }
  .photo:hover .photo-mask { opacity: 1; }
  .photo-mask {
    position: absolute; inset: 0; background: rgba(0,0,0,.45); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    opacity: 0; transition: opacity .15s;
  }
  @media print { .photo-mask { display: none; } .photo { cursor: default; } }
  /* 求职意向 */
  .intent { display: flex; gap: 10px; margin: 14px 0 4px; }
  .intent .chip {
    flex: 1; background: var(--bg-soft); border-radius: 6px; padding: 8px 12px;
    font-size: 12px; border-left: 3px solid var(--accent);
  }
  .intent .chip .k { color: var(--muted); }
  .intent .chip .v { color: var(--ink); font-weight: 600; }
  /* 区块标题 */
  .section { margin-top: 18px; }
  .section-title {
    display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700;
    color: var(--accent-dark); margin-bottom: 10px;
  }
  .section-title::before { content: ""; width: 5px; height: 16px; background: var(--accent); border-radius: 2px; }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  /* 工作 / 项目条目 */
  .item { margin-bottom: 14px; page-break-inside: avoid; }
  .item-head {
    display: flex; justify-content: space-between; align-items: baseline;
    flex-wrap: wrap; gap: 4px 12px;
  }
  .item-head .org { font-weight: 700; font-size: 13.5px; }
  .item-head .pos { color: var(--accent); font-weight: 600; }
  .item-head .date { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .tech { margin: 5px 0; font-size: 12px; color: var(--muted); background: var(--bg-soft); padding: 5px 10px; border-radius: 4px; }
  .tech b { color: var(--accent-dark); }
  .desc { margin-top: 5px; }
  .desc p { margin: 2px 0; color: var(--muted); }
  ul.duties { margin: 5px 0 0 18px; }
  ul.duties li { margin: 3px 0; color: var(--muted); }
  /* 技能 */
  ul.skills { list-style: none; }
  ul.skills li { position: relative; padding-left: 18px; margin: 5px 0; color: var(--muted); }
  ul.skills li::before { content: "▹"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  ul.skills li b { color: var(--ink); }
  /* 自我评价 */
  .summary p { position: relative; padding-left: 18px; margin: 5px 0; color: var(--muted); }
  .summary p::before { content: "◆"; position: absolute; left: 0; font-size: 9px; top: 5px; color: var(--accent); }
  /* 教育 */
  .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .edu-row .school { font-weight: 700; }
  .edu-row .major { color: var(--muted); }
  .edu-row .date { color: var(--muted); font-size: 12px; }
  /* 工具栏 */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    display: flex; align-items: center; gap: 8px; padding: 8px 16px;
    background: rgba(255,255,255,.95); backdrop-filter: blur(6px);
    box-shadow: 0 2px 10px rgba(0,0,0,.1); font-size: 13px;
  }
  .toolbar .brand { font-weight: 700; color: var(--accent-dark); margin-right: auto; }
  .toolbar button {
    border: 1px solid var(--line); background: #fff; color: var(--ink);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  @media print {
    body { background: #fff; padding-top: 0; }
    .page { margin: 0; box-shadow: none; width: auto; min-height: auto; }
    @page { size: A4; margin: 12mm; }
    .toolbar { display: none !important; }
  }
  .load-error { max-width: 600px; margin: 40px auto; padding: 20px; background: #fff3f3; border: 1px solid #ffcccc; border-radius: 8px; color: #b00; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="brand">📄 我的简历</span>
  <button id="btnPdf" class="primary">⬇️ 导出 PDF</button>
</div>

<div class="page" id="resume"></div>

<input type="file" id="photoInput" accept="image/*" style="display:none">

<script src="data.js"></script>
<script>
(function () {
  var PHOTO_KEY = 'resume-photo-v1';

  function esc(s) { return String(s == null ? '' : s); }

  function render(d) {
    document.title = d.title || '简历';

    var basicHtml = d.basic.map(function (b) {
      return '<span><b>' + esc(b.label) + '：</b>' + esc(b.value) + '</span>';
    }).join('');

    var intentHtml = d.intent.map(function (c) {
      return '<div class="chip"><div class="k">' + esc(c.k) + '</div><div class="v">' + esc(c.v) + '</div></div>';
    }).join('');

    var workHtml = d.work.map(function (w) {
      var duties = (w.duties || []).map(function (x) { return '<li>' + x + '</li>'; }).join('');
      return '<div class="item"><div class="item-head">'
        + '<span><span class="org">' + esc(w.org) + '</span> &nbsp;·&nbsp; <span class="pos">' + esc(w.pos) + '</span></span>'
        + '<span class="date">' + esc(w.date) + '</span></div>'
        + '<ul class="duties">' + duties + '</ul></div>';
    }).join('');

    var skillsHtml = (d.skills || []).map(function (s) { return '<li>' + s + '</li>'; }).join('');

    var projHtml = d.projects.map(function (p) {
      var duties = (p.duties || []).map(function (x) { return '<li>' + x + '</li>'; }).join('');
      return '<div class="item"><div class="item-head">'
        + '<span class="org">' + esc(p.name) + '</span><span class="date">' + esc(p.date) + '</span></div>'
        + (p.tech ? '<div class="tech"><b>技术栈：</b>' + esc(p.tech) + '</div>' : '')
        + (p.desc ? '<div class="desc"><p><b>项目描述：</b>' + esc(p.desc) + '</p></div>' : '')
        + (duties ? '<ul class="duties">' + duties + '</ul>' : '') + '</div>';
    }).join('');

    var eduHtml = d.education.map(function (e) {
      return '<div class="edu-row"><span><span class="school">' + esc(e.school) + '</span> &nbsp;·&nbsp; <span class="major">' + esc(e.major) + '</span></span>'
        + '<span class="date">' + esc(e.date) + '</span></div>';
    }).join('');

    var summaryHtml = (d.summary || []).map(function (s) { return '<p>' + s + '</p>'; }).join('');

    document.getElementById('resume').innerHTML =
      '<header class="header"><div class="head-left">'
        + '<div class="name">' + esc(d.name) + '</div>'
        + '<div class="role">' + esc(d.role) + '</div>'
        + '<div class="contact">' + basicHtml + '</div>'
      + '</div>'
      + '<div class="photo" id="photo" title="点击上传照片"><span class="photo-hint">点击<br>上传照片</span><span class="photo-mask">更换照片</span></div>'
      + '</header>'
      + '<div class="intent">' + intentHtml + '</div>'
      + '<section class="section"><div class="section-title">工作经历</div>' + workHtml + '</section>'
      + '<section class="section"><div class="section-title">专业技能</div><ul class="skills">' + skillsHtml + '</ul></section>'
      + '<section class="section"><div class="section-title">项目经历</div>' + projHtml + '</section>'
      + '<section class="section"><div class="section-title">教育经历</div>' + eduHtml + '</section>'
      + '<section class="section"><div class="section-title">自我评价</div><div class="summary">' + summaryHtml + '</div></section>';

    bindPhoto();
  }

  function bindPhoto() {
    var photo = document.getElementById('photo');
    var input = document.getElementById('photoInput');
    if (!photo) return;
    var saved = localStorage.getItem(PHOTO_KEY);
    if (saved) { photo.style.backgroundImage = 'url(' + saved + ')'; photo.classList.add('has-img'); }
    photo.addEventListener('click', function () { input.click(); });
    input.onchange = function () {
      var file = input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        photo.style.backgroundImage = 'url(' + e.target.result + ')';
        photo.classList.add('has-img');
        try { localStorage.setItem(PHOTO_KEY, e.target.result); } catch (err) {}
      };
      reader.readAsDataURL(file);
    };
  }

  document.getElementById('btnPdf').addEventListener('click', function () { window.print(); });

  if (typeof RESUME === 'undefined') {
    document.getElementById('resume').innerHTML =
      '<div class="load-error">没读到简历内容（data.js）。请确认 data.js 和 index.html 在同一目录，且 data.js 语法正确（引号、逗号别漏）。</div>';
  } else {
    try { render(RESUME); }
    catch (e) {
      document.getElementById('resume').innerHTML =
        '<div class="load-error">渲染出错，多半是 data.js 里少了引号或逗号。错误信息：' + esc(e.message) + '</div>';
    }
  }
})();
</script>
</body>
</html>
