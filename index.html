<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简历</title>
<style>
  :root {
    --accent: #1f6feb;
    --accent-dark: #0d3b8c;
    --ink: #1f2328;
    --muted: #57606a;
    --line: #e4e8ee;
    --bg-soft: #f6f8fb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Roboto, sans-serif;
    color: var(--ink); font-size: 13px; line-height: 1.7; background: #dfe3e8; padding-top: 52px;
  }
  .page {
    width: 210mm; max-width: 100%; min-height: 297mm; margin: 12px auto; padding: 16mm 15mm;
    background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,.12);
  }
  .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px 32px; padding-bottom: 18px; border-bottom: 2px solid var(--accent); }
  .header .head-left { min-width: 0; flex: 1; }
  .header .name { font-size: 32px; font-weight: 800; letter-spacing: 1px; color: var(--accent-dark); }
  .header .role { margin-top: 6px; font-size: 13.5px; color: var(--accent); font-weight: 600; letter-spacing: .3px; }
  .header .role:empty { display: none; }
  .header .contact { margin-top: 14px; font-size: 12px; color: var(--muted); display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 7px 36px; max-width: 540px; align-content: start; }
  .header .contact span.kv { display: block; margin: 0; white-space: nowrap; }
  .header .contact b { color: var(--ink); font-weight: 600; }
  .photo {
    position: relative; width: 98px; height: 130px; flex: 0 0 auto;
    border: 1px solid #e6ebf1; border-radius: 10px; background: var(--bg-soft) center/cover no-repeat;
    display: flex; align-items: center; justify-content: center; color: #aab2bd; font-size: 12px;
    text-align: center; cursor: pointer; overflow: hidden; box-shadow: 0 6px 18px rgba(31,111,235,.16);
  }
  .photo.has-img .photo-hint { display: none; }
  .photo:hover .photo-mask { opacity: 1; }
  .photo-mask { position: absolute; inset: 0; background: rgba(0,0,0,.45); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; opacity: 0; transition: opacity .15s; }
  @media print { .photo-mask { display: none; } .photo { cursor: default; } }
  .intent { display: flex; flex-wrap: wrap; gap: 12px; margin: 18px 0 4px; }
  .intent .chip { flex: 1 1 auto; background: var(--bg-soft); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; font-size: 12px; }
  .intent .chip .k { color: var(--muted); font-size: 11px; letter-spacing: .5px; margin-bottom: 3px; }
  .intent .chip .v { color: var(--accent-dark); font-weight: 700; font-size: 13px; white-space: nowrap; }
  .section { margin-top: 18px; }
  .section-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--accent-dark); margin-bottom: 10px; }
  .section-title::before { content: ""; width: 5px; height: 16px; background: var(--accent); border-radius: 2px; }
  .section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .item { margin-bottom: 14px; page-break-inside: avoid; }
  .item-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 4px 12px; }
  .item-head .org { font-weight: 700; font-size: 13.5px; }
  .item-head .pos { color: var(--accent); font-weight: 600; }
  .item-head .date { color: var(--muted); font-size: 12px; white-space: nowrap; }
  .tech { margin: 5px 0; font-size: 12px; color: var(--muted); background: var(--bg-soft); padding: 5px 10px; border-radius: 4px; }
  .tech b { color: var(--accent-dark); }
  .desc { margin-top: 5px; }
  .desc p { margin: 2px 0; color: var(--muted); }
  ul.duties { margin: 5px 0 0 18px; }
  ul.duties li { margin: 3px 0; color: var(--muted); }
  ul.skills { list-style: none; }
  ul.skills li { position: relative; padding-left: 18px; margin: 5px 0; color: var(--muted); }
  ul.skills li::before { content: "▹"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  ul.skills li b { color: var(--ink); }
  .summary p { position: relative; padding-left: 18px; margin: 5px 0; color: var(--muted); }
  .summary p::before { content: "◆"; position: absolute; left: 0; font-size: 9px; top: 5px; color: var(--accent); }
  .edu-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .edu-row .school { font-weight: 700; }
  .edu-row .major { color: var(--muted); }
  .edu-row .date { color: var(--muted); font-size: 12px; }
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999; display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; background: rgba(255,255,255,.95); backdrop-filter: blur(6px); box-shadow: 0 2px 10px rgba(0,0,0,.1); font-size: 13px;
  }
  .toolbar .brand { font-weight: 700; color: var(--accent-dark); margin-right: auto; }
  .toolbar button { border: 1px solid var(--line); background: #fff; color: var(--ink); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; }
  .toolbar button:hover { border-color: var(--accent); color: var(--accent); }
  .toolbar button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar button.primary:hover { background: var(--accent-dark); color: #fff; }
  .toolbar select { border: 1px solid var(--line); background: #fff; color: var(--ink); padding: 6px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; max-width: 200px; }
  .toolbar select:hover { border-color: var(--accent); color: var(--accent); }
  .load-error { max-width: 600px; margin: 40px auto; padding: 20px; background: #fff3f3; border: 1px solid #ffcccc; border-radius: 8px; color: #b00; }
  .edit-tip { position: fixed; top: 52px; left: 0; right: 0; z-index: 998; background: var(--accent-dark); color: #fff; text-align: center; padding: 6px 12px; font-size: 12px; display: none; }
  body.editing { padding-top: 84px; }
  body.editing .edit-tip { display: block; }
  body.editing [data-bind] { outline: 1px dashed #c3d3ef; outline-offset: 2px; border-radius: 2px; min-width: 20px; }
  body.editing [data-bind]:hover { background: #eef4ff; }
  body.editing [data-bind]:focus { outline: 2px solid var(--accent); background: #fff; }
  .li-ctrl { display: none; }
  body.editing .li-ctrl { display: inline-flex; gap: 4px; margin-left: 6px; vertical-align: middle; }
  body.editing .li-ctrl button, body.editing .add-btn { border: 1px solid var(--line); background: #fff; color: var(--muted); width: 20px; height: 20px; line-height: 1; border-radius: 4px; cursor: pointer; font-size: 13px; padding: 0; }
  body.editing .li-ctrl button:hover { border-color: var(--accent); color: var(--accent); }
  .add-btn { display: none; }
  body.editing .add-btn { display: inline-block; width: auto; padding: 2px 10px; height: auto; margin-top: 6px; font-size: 12px; color: var(--accent); }
  /* 内容/AI 编辑弹窗 */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1001; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-mask.show { display: flex; }
  .modal { background: #fff; border-radius: 10px; width: min(880px, 100%); max-height: 90vh; display: flex; flex-direction: column; padding: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .modal-head b { font-size: 15px; color: var(--accent-dark); }
  .modal-head button { border: none; background: none; font-size: 24px; cursor: pointer; color: var(--muted); line-height: 1; }
  .modal-tip { font-size: 12px; color: var(--muted); margin-bottom: 8px; line-height: 1.7; }
  .modal textarea { width: 100%; flex: 1; min-height: 360px; font-family: Consolas, Menlo, monospace; font-size: 12px; line-height: 1.5; padding: 12px; border: 1px solid var(--line); border-radius: 6px; resize: vertical; white-space: pre; overflow: auto; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .modal-actions button { border: 1px solid var(--line); background: #fff; color: var(--ink); padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .modal-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .modal-actions button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-actions button.primary:hover { background: var(--accent-dark); }
  .modal-error { color: #b00; font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
  /* 窄屏 / 手机：缩小内边距与标题，避免横向溢出（不影响 A4 打印） */
  @media screen and (max-width: 820px) {
    .page { padding: 24px 18px; margin: 8px auto; min-height: auto; }
    .header .name { font-size: 26px; }
    .header .contact { max-width: none; }
  }
  @media print {
    body { background: #fff; padding-top: 0; }
    body.editing { padding-top: 0; }
    .page { margin: 0; box-shadow: none; width: auto; min-height: auto; }
    @page { size: A4; margin: 12mm; }
    .toolbar, .edit-tip, .li-ctrl, .add-btn, .modal-mask { display: none !important; }
    [data-bind] { outline: none !important; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="brand">📄 我的简历</span>
  <select id="verSelect" title="选择简历版本"></select>
  <button id="btnVerAdd" style="display:none">＋ 新版本</button>
  <button id="btnVerRename" style="display:none">✎ 重命名</button>
  <button id="btnVerDel" style="display:none">🗑 删除版本</button>
  <button id="btnEdit">✏️ 逐项编辑</button>
  <button id="btnData">📝 内容/AI 编辑</button>
  <button id="btnSave" class="primary" style="display:none">☁️ 保存到云端</button>
  <button id="btnDownload" style="display:none">⬇️ 下载 data.js</button>
  <button id="btnCancel" style="display:none">取消</button>
  <button id="btnPdf">⬇️ 导出 PDF</button>
</div>
<div class="edit-tip" id="editTip">编辑模式：点文字直接改；列表项旁 ＋/× 可增删。改完点「保存到云端」同步到所有设备（或「下载 data.js」手动上传）。</div>

<div class="page" id="resume"></div>

<input type="file" id="photoInput" accept="image/*" style="display:none">

<div class="modal-mask" id="dataModal">
  <div class="modal">
    <div class="modal-head">
      <b>📝 内容 / AI 编辑</b>
      <button id="dmClose" title="关闭">×</button>
    </div>
    <p class="modal-tip">下面是你简历的全部内容（JSON）。可整段复制给 AI 润色/重写，再把结果粘回来，点「应用并预览」看效果、「应用并保存」同步到所有设备。<b>只改文字，别动字段名和括号结构</b>；skills / 职责里可用 &lt;b&gt;词&lt;/b&gt; 加粗。</p>
    <textarea id="dmText" spellcheck="false"></textarea>
    <div class="modal-actions">
      <button id="dmCopy">📋 复制给 AI（含说明）</button>
      <button id="dmApply">👁 应用并预览</button>
      <button id="dmSave" class="primary">☁️ 应用并保存到云端</button>
    </div>
    <div id="dmError" class="modal-error"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
(function () {
  var PHOTO_KEY = 'resume-photo-v1';
  var TOKEN_KEY = 'gh-token';
  var GH = { owner: 'tddyyds', repo: 'resume', path: 'data.js', branch: 'master' };

  var resumeEl = document.getElementById('resume');
  var editing = false;
  var current = null;              // 当前正在预览/编辑的版本内容
  var versions = [];               // [{ id, label, data }]
  var activeIdx = 0;               // 当前选中的版本下标
  var originalVersions = null;     // 全量快照，用于「取消」还原

  function esc(s) { return String(s == null ? '' : s); }
  function clone(o) { return JSON.parse(JSON.stringify(o)); }
  function getByPath(o, p) { return p.split('.').reduce(function (a, k) { return a[k]; }, o); }
  function setByPath(o, p, v) { var ks = p.split('.'); var last = ks.pop(); var t = ks.reduce(function (a, k) { return a[k]; }, o); t[last] = v; }
  function delByPath(o, p) { var ks = p.split('.'); var last = ks.pop(); var t = ks.reduce(function (a, k) { return a[k]; }, o); if (Array.isArray(t)) t.splice(Number(last), 1); else delete t[last]; }

  function ctrl(delPath) { return '<span class="li-ctrl"><button type="button" data-action="del" data-path="' + delPath + '" title="删除">×</button></span>'; }
  function addBtn(path, label) { return '<button type="button" class="add-btn" data-action="add" data-path="' + path + '">＋ ' + label + '</button>'; }
  function b(path, val) { return '<span data-bind="' + path + '">' + val + '</span>'; }

  function defaultFor(path) {
    var key = path.split('.').pop();
    if (key === 'duties') return '新的一条职责 / 描述';
    if (key === 'skills') return '新技能描述';
    if (key === 'summary') return '新的一条评价';
    if (key === 'work') return { org: '公司名称', pos: '职位名称', date: '2020.01 ~ 2020.12', duties: ['职责描述'] };
    if (key === 'projects') return { name: '项目名称', date: '2020.01 ~ 2020.12', tech: '技术栈', desc: '项目描述', duties: ['个人职责'] };
    if (key === 'education') return { school: '学校名称', major: '专业名称', date: '2016.09 ~ 2020.07' };
    if (key === 'basic') return { label: '标签', value: '内容' };
    if (key === 'intent') return { k: '标签', v: '内容' };
    return '';
  }

  function render(d) {
    document.title = d.title || '简历';

    var basicHtml = d.basic.map(function (x, i) {
      return '<span class="kv"><b>' + b('basic.' + i + '.label', esc(x.label)) + '：</b>' + b('basic.' + i + '.value', esc(x.value)) + ctrl('basic.' + i) + '</span>';
    }).join('') + addBtn('basic', '加一项');

    var intentHtml = d.intent.map(function (x, i) {
      return '<div class="chip"><div class="k">' + b('intent.' + i + '.k', esc(x.k)) + '</div><div class="v">' + b('intent.' + i + '.v', esc(x.v)) + ctrl('intent.' + i) + '</div></div>';
    }).join('');

    var workHtml = d.work.map(function (w, i) {
      var duties = (w.duties || []).map(function (x, j) {
        return '<li>' + b('work.' + i + '.duties.' + j, x) + ctrl('work.' + i + '.duties.' + j) + '</li>';
      }).join('');
      return '<div class="item"><div class="item-head">'
        + '<span><span class="org">' + b('work.' + i + '.org', esc(w.org)) + '</span> &nbsp;·&nbsp; <span class="pos">' + b('work.' + i + '.pos', esc(w.pos)) + '</span>' + ctrl('work.' + i) + '</span>'
        + '<span class="date">' + b('work.' + i + '.date', esc(w.date)) + '</span></div>'
        + '<ul class="duties">' + duties + '</ul>' + addBtn('work.' + i + '.duties', '添加职责') + '</div>';
    }).join('') + addBtn('work', '添加一段工作经历');

    var skillsHtml = (d.skills || []).map(function (s, i) {
      return '<li>' + b('skills.' + i, s) + ctrl('skills.' + i) + '</li>';
    }).join('');

    var projHtml = d.projects.map(function (p, i) {
      var duties = (p.duties || []).map(function (x, j) {
        return '<li>' + b('projects.' + i + '.duties.' + j, x) + ctrl('projects.' + i + '.duties.' + j) + '</li>';
      }).join('');
      return '<div class="item"><div class="item-head">'
        + '<span class="org">' + b('projects.' + i + '.name', esc(p.name)) + ctrl('projects.' + i) + '</span>'
        + '<span class="date">' + b('projects.' + i + '.date', esc(p.date)) + '</span></div>'
        + '<div class="tech"><b>技术栈：</b>' + b('projects.' + i + '.tech', esc(p.tech)) + '</div>'
        + '<div class="desc"><p><b>项目描述：</b>' + b('projects.' + i + '.desc', esc(p.desc)) + '</p></div>'
        + '<ul class="duties">' + duties + '</ul>' + addBtn('projects.' + i + '.duties', '添加职责') + '</div>';
    }).join('') + addBtn('projects', '添加一个项目');

    var eduHtml = d.education.map(function (e, i) {
      return '<div class="edu-row"><span><span class="school">' + b('education.' + i + '.school', esc(e.school)) + '</span> &nbsp;·&nbsp; <span class="major">' + b('education.' + i + '.major', esc(e.major)) + '</span>' + ctrl('education.' + i) + '</span>'
        + '<span class="date">' + b('education.' + i + '.date', esc(e.date)) + '</span></div>';
    }).join('') + addBtn('education', '加一条教育经历');

    var summaryHtml = (d.summary || []).map(function (s, i) {
      return '<p>' + b('summary.' + i, s) + ctrl('summary.' + i) + '</p>';
    }).join('') + addBtn('summary', '加一条');

    resumeEl.innerHTML =
      '<header class="header"><div class="head-left">'
        + '<div class="name">' + b('name', esc(d.name)) + '</div>'
        + '<div class="role">' + b('role', esc(d.role)) + '</div>'
        + '<div class="contact">' + basicHtml + '</div>'
      + '</div>'
      + '<div class="photo" id="photo" title="点击上传照片"><span class="photo-hint">点击<br>上传照片</span><span class="photo-mask">更换照片</span></div>'
      + '</header>'
      + '<div class="intent">' + intentHtml + '</div>'
      + '<section class="section"><div class="section-title">工作经历</div>' + workHtml + '</section>'
      + '<section class="section"><div class="section-title">专业技能</div><ul class="skills">' + skillsHtml + '</ul></section>'
      + '<section class="section"><div class="section-title">项目经历</div>' + projHtml + '</section>'
      + '<section class="section"><div class="section-title">教育经历</div>' + eduHtml + '</section>'
      + '<section class="section"><div class="section-title">自我评价</div><div class="summary">' + summaryHtml + '</div></section>';

    bindPhoto();
    if (editing) setEditable(true);
  }

  function setEditable(on) {
    var nodes = resumeEl.querySelectorAll('[data-bind]');
    for (var i = 0; i < nodes.length; i++) nodes[i].contentEditable = on ? 'true' : 'false';
  }

  function bindPhoto() {
    var photo = document.getElementById('photo');
    var input = document.getElementById('photoInput');
    if (!photo) return;
    var saved = localStorage.getItem(PHOTO_KEY);
    if (saved) { photo.style.backgroundImage = 'url(' + saved + ')'; photo.classList.add('has-img'); }
    photo.addEventListener('click', function () { input.click(); });
    input.onchange = function () {
      var file = input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        photo.style.backgroundImage = 'url(' + e.target.result + ')';
        photo.classList.add('has-img');
        try { localStorage.setItem(PHOTO_KEY, e.target.result); } catch (err) {}
      };
      reader.readAsDataURL(file);
    };
  }

  // 输入实时写回 current
  resumeEl.addEventListener('input', function (e) {
    var el = e.target.closest ? e.target.closest('[data-bind]') : null;
    if (el) setByPath(current, el.getAttribute('data-bind'), el.innerHTML.trim());
  });

  // 增删按钮
  resumeEl.addEventListener('click', function (e) {
    var btn = e.target.closest ? e.target.closest('[data-action]') : null;
    if (!btn) return;
    e.preventDefault();
    var action = btn.getAttribute('data-action');
    var path = btn.getAttribute('data-path');
    if (action === 'add') { getByPath(current, path).push(defaultFor(path)); }
    else if (action === 'del') { delByPath(current, path); }
    render(current);
  });

  function toggleBtns(on) {
    document.getElementById('btnSave').style.display = on ? '' : 'none';
    document.getElementById('btnDownload').style.display = on ? '' : 'none';
    document.getElementById('btnCancel').style.display = on ? '' : 'none';
    document.getElementById('btnVerAdd').style.display = on ? '' : 'none';
    document.getElementById('btnVerRename').style.display = on ? '' : 'none';
    document.getElementById('btnVerDel').style.display = on ? '' : 'none';
    var be = document.getElementById('btnEdit');
    be.textContent = on ? '✏️ 编辑中' : '✏️ 编辑';
    be.classList.toggle('primary', on);
  }

  function enterEdit() { editing = true; document.body.classList.add('editing'); toggleBtns(true); setEditable(true); }
  function exitEdit() { editing = false; document.body.classList.remove('editing'); toggleBtns(false); setEditable(false); }

  // ===== 多版本管理 =====
  function syncCurrent() { if (versions[activeIdx]) versions[activeIdx].data = clone(current); }

  function renderVersionSelect() {
    var sel = document.getElementById('verSelect');
    sel.innerHTML = versions.map(function (v, i) {
      return '<option value="' + i + '"' + (i === activeIdx ? ' selected' : '') + '>' + esc(v.label) + '</option>';
    }).join('');
  }

  function switchVersion(idx) {
    if (idx === activeIdx || !versions[idx]) { renderVersionSelect(); return; }
    syncCurrent();                       // 先把当前编辑内容存回内存
    activeIdx = idx;
    current = clone(versions[activeIdx].data);
    renderVersionSelect();
    render(current);
  }

  document.getElementById('verSelect').addEventListener('change', function () { switchVersion(Number(this.value)); });

  document.getElementById('btnVerAdd').addEventListener('click', function () {
    var name = prompt('新版本名称：', '新版本');
    if (name === null) return;
    syncCurrent();
    var copy = clone(versions[activeIdx].data);
    versions.push({ id: 'v' + Date.now(), label: (name.trim() || ('版本' + (versions.length + 1))), data: copy });
    activeIdx = versions.length - 1;
    current = clone(copy);
    renderVersionSelect(); render(current);
    toast('已新增版本（基于当前版本复制），改完记得「保存到云端」');
  });

  document.getElementById('btnVerRename').addEventListener('click', function () {
    var name = prompt('重命名当前版本：', versions[activeIdx].label);
    if (name === null) return;
    versions[activeIdx].label = name.trim() || versions[activeIdx].label;
    renderVersionSelect();
    toast('已重命名，记得「保存到云端」');
  });

  document.getElementById('btnVerDel').addEventListener('click', function () {
    if (versions.length <= 1) { alert('至少保留一个版本，无法删除。'); return; }
    if (!confirm('确定删除版本「' + versions[activeIdx].label + '」？保存到云端后生效。')) return;
    versions.splice(activeIdx, 1);
    if (activeIdx >= versions.length) activeIdx = versions.length - 1;
    current = clone(versions[activeIdx].data);
    renderVersionSelect(); render(current);
    toast('已删除该版本，记得「保存到云端」');
  });

  document.getElementById('btnEdit').addEventListener('click', function () { if (editing) { exitEdit(); } else { enterEdit(); } });
  document.getElementById('btnCancel').addEventListener('click', function () {
    versions = clone(originalVersions);
    if (activeIdx >= versions.length) activeIdx = 0;
    current = clone(versions[activeIdx].data);
    renderVersionSelect(); exitEdit(); render(current);
  });
  document.getElementById('btnPdf').addEventListener('click', function () { window.print(); });
  document.getElementById('btnDownload').addEventListener('click', function () {
    syncCurrent();
    var blob = new Blob([serialize()], { type: 'text/javascript;charset=utf-8' });
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.js'; a.click(); URL.revokeObjectURL(a.href);
    toast('已下载 data.js，可上传到 GitHub 覆盖同名文件');
  });
  document.getElementById('btnSave').addEventListener('click', saveCloud);

  // ===== 内容 / AI 编辑弹窗 =====
  var modal = document.getElementById('dataModal');
  var dmText = document.getElementById('dmText');
  var dmError = document.getElementById('dmError');

  function openData() { dmError.textContent = ''; dmText.value = JSON.stringify(current, null, 2); modal.classList.add('show'); }
  function closeData() { modal.classList.remove('show'); }

  function normalize(o) {
    o.title = o.title || '简历'; o.name = o.name || ''; o.role = o.role || '';
    ['basic', 'intent', 'work', 'skills', 'projects', 'education', 'summary'].forEach(function (k) { if (!Array.isArray(o[k])) o[k] = []; });
    return o;
  }
  function parseData(text) {
    var t = (text || '').trim();
    var i = t.indexOf('{'), j = t.lastIndexOf('}');
    if (i < 0 || j <= i) throw new Error('没找到内容，请粘贴完整的 { ... } 数据');
    return normalize(JSON.parse(t.slice(i, j + 1)));
  }
  function tmpCopy(s) {
    var ta = document.createElement('textarea'); ta.value = s; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('已复制，去粘给 AI 即可'); } catch (e) { toast('复制失败，请手动全选复制'); }
    document.body.removeChild(ta);
  }
  function copyText(s) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(s).then(function () { toast('已复制，去粘给 AI 即可'); }).catch(function () { tmpCopy(s); });
    } else tmpCopy(s);
  }

  document.getElementById('btnData').addEventListener('click', openData);
  document.getElementById('dmClose').addEventListener('click', closeData);
  modal.addEventListener('click', function (e) { if (e.target === modal) closeData(); });

  document.getElementById('dmApply').addEventListener('click', function () {
    try { current = parseData(dmText.value); render(current); closeData(); toast('已应用（还没保存，记得点「保存到云端」）'); }
    catch (e) { dmError.textContent = '解析失败：' + e.message + '\n请检查 JSON 是否合法（引号、逗号、括号要配对；末尾多余逗号会报错）。'; }
  });
  document.getElementById('dmSave').addEventListener('click', function () {
    try { current = parseData(dmText.value); render(current); }
    catch (e) { dmError.textContent = '解析失败：' + e.message; return; }
    closeData(); saveCloud();
  });
  document.getElementById('dmCopy').addEventListener('click', function () {
    var p = '请帮我优化/重写下面这份 JSON 格式的简历内容。要求：\n'
      + '1) 保持 JSON 结构和所有字段名不变；\n'
      + '2) 只返回完整、合法的 JSON，不要任何解释文字，不要用 ```代码块``` 包裹；\n'
      + '3) skills 和各 duties 里可用 <b>词</b> 给关键词加粗；\n'
      + '4) 不要出现末尾多余逗号。\n\n当前内容：\n'
      + JSON.stringify(current, null, 2);
    copyText(p);
  });

  function serialize() {
    return '/* 简历内容（多版本，由网页端“保存/下载”自动生成，可继续在网页或 GitHub 上编辑） */\n\n'
      + 'const RESUME_DATA = ' + JSON.stringify({ versions: versions }, null, 2) + ';\n';
  }
  function b64(str) { return btoa(unescape(encodeURIComponent(str))); }

  function saveCloud() {
    var token = localStorage.getItem(TOKEN_KEY);
    if (!token) {
      token = prompt('首次保存需要 GitHub 令牌（只用于把改动提交回你的仓库，仅存在本浏览器）。\n生成方法：GitHub → Settings → Developer settings → Fine-grained tokens → 只授权 tddyyds/resume 仓库的 Contents 读写。\n\n把令牌粘贴到这里：');
      if (!token) return;
      token = token.trim();
      localStorage.setItem(TOKEN_KEY, token);
    }
    syncCurrent();
    var text = serialize();
    var base = 'https://api.github.com/repos/' + GH.owner + '/' + GH.repo + '/contents/' + GH.path;
    var headers = { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' };
    toast('正在保存…');
    fetch(base + '?ref=' + GH.branch, { headers: headers })
      .then(function (r) {
        if (r.status === 401) { localStorage.removeItem(TOKEN_KEY); throw new Error('令牌无效或已过期，请重试并重新输入令牌'); }
        return r.status === 200 ? r.json() : null;
      })
      .then(function (info) {
        var body = { message: 'update resume via web', content: b64(text), branch: GH.branch };
        if (info && info.sha) body.sha = info.sha;
        return fetch(base, { method: 'PUT', headers: Object.assign({ 'Content-Type': 'application/json' }, headers), body: JSON.stringify(body) });
      })
      .then(function (r) { return r.ok ? r.json() : r.json().then(function (e) { throw new Error(e.message || ('HTTP ' + r.status)); }); })
      .then(function () { syncCurrent(); originalVersions = clone(versions); exitEdit(); toast('✅ 已保存到云端，约 1 分钟后所有设备生效'); })
      .catch(function (err) { alert('保存失败：' + err.message + '\n\n可改用「下载 data.js」，再到 github.com 上传覆盖同名文件。'); });
  }

  function toast(msg) {
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:1000;background:#1f6feb;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,.2)';
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 2200);
  }

  // 读取版本数据：优先新版多版本格式（RESUME_DATA），兼容旧版单份格式（RESUME）
  function loadVersions() {
    if (typeof RESUME_DATA !== 'undefined' && RESUME_DATA && Array.isArray(RESUME_DATA.versions) && RESUME_DATA.versions.length) {
      return RESUME_DATA.versions.map(function (v, i) {
        return { id: v.id || ('v' + i), label: v.label || ('版本' + (i + 1)), data: normalize(clone(v.data || {})) };
      });
    }
    if (typeof RESUME !== 'undefined') {
      return [{ id: 'default', label: '默认版本', data: normalize(clone(RESUME)) }];
    }
    return null;
  }

  versions = loadVersions();
  if (!versions) {
    resumeEl.innerHTML = '<div class="load-error">没读到简历内容（data.js）。请确认 data.js 与 index.html 在同一目录。</div>';
  } else {
    activeIdx = 0;
    originalVersions = clone(versions);
    current = clone(versions[activeIdx].data);
    renderVersionSelect();
    try { render(current); }
    catch (e) { resumeEl.innerHTML = '<div class="load-error">渲染出错：' + esc(e.message) + '</div>'; }
  }
})();
</script>
</body>
</html>
